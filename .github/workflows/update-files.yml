name: Update files from example.com

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-example-files
  cancel-in-progress: false

jobs:
  update-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download files
        run: |
          set -e

          mkdir -p tmp_downloads

          curl -fL --retry 3 --retry-delay 5 \
            -o tmp_downloads/xbssfwf0vy.engine.js \
            "https://xbssfwf0vy.kameleoon.eu/engine.js"

          curl -fL --retry 3 --retry-delay 5 \
            -o tmp_downloads/5hxvxemsh6.engine.js \
            "https://5hxvxemsh6.kameleoon.eu/engine.js"

      - name: Update files if changed
        run: |
          set -e

          changed=0

          if [ ! -f file1.txt ] || ! cmp -s tmp_downloads/file1.txt file1.txt; then
            cp tmp_downloads/file1.txt file1.txt
            changed=1
          fi

          if [ ! -f file2.txt ] || ! cmp -s tmp_downloads/file2.txt file2.txt; then
            cp tmp_downloads/file2.txt file2.txt
            changed=1
          fi

          if [ "$changed" -eq 1 ]; then
            git add file1.txt file2.txt
            git commit -m "Update files from example.com"
            git push
          else
            echo "No changes detected"
          fi
